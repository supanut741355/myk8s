apiVersion: v1
kind: Pod
metadata:
  name: myapp-pod
  lable:
    app: myapp
    type: backend

spec:
  containers:
    - name: nginx-container
      image: nginx

---

apiVersion: v1
kind: Service
metadata:
  name: myapp-service

spec:
  type: ClusterIP
  ports:
    - targetPort: 80
      port: 80

  selector:
    app: myapp
    type: back-end
