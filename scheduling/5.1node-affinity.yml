## This deployment we need to force pod is place only node with label color=blue by using nodeAffinity

apiVersion: apps/v1
kind: Deployment
metadata:
  name: blue

spec:
  replicas: 3
  selector:
    matchLabels:
        app: blue
  template:
    metadata:
      name: nginx-pod
      labels:
        app: blue
    spec:
      containers:
      - name: nginx-container
        image: nginx
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: color
                    operator: In
                    values:
                      - blue

---

## This deployment we need to force pod is place only controlplan node that with label node-role.kubernetes.io/control-plane

apiVersion: apps/v1
kind: Deployment
metadata:
  name: red


spec:
  replicas: 2
  selector:
    matchLabels:
      app: red-deployment
  template:
    metadata:
      labels:
        app: red-deployment
    spec:
      containers:
        - name: nginx-container
          image: nginx
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
                - key: node-role.kubernetes.io/control-plane
                  operator: Exists
