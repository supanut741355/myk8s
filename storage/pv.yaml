apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-vol1
spec:
  accessModes:
    - ReadWriteOnce
  capacity:
    storage: 1Gi
  hostPath:
    path: /tmp/data
  persistentVolumeReclaimPolicy: retain
  awsElasticBlockStore:
    volumeID: [VOLUME-ID]
    fsType: ext4

---
apiVersion: v1
kind: PersistenVolume
metadata:
  name: pv-log
spec:
  accessModes: 
  - ReadWriteMany
  persistentVolumeReclaimPolicy: retian
  capacity:
    storage: 100Mi
  hostPath:
    path: /pv/log
  