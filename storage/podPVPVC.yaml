apiVersion: v1
kind: PersistenVolume
metadata:
  name: pv-log
spec:
  accessModes: 
  - ReadWriteMany
  persistentVolumeReclaimPolicy: retian
  capacity:
    storage: 100Mi
  hostPath:
    path: /pv/log
  

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: claim-log-1
spec:
  resources:
    requests:
      storage: 50Mi
  accessModes:
    - ReadWriteMany


---
apiVersion: v1
kind: Pod
metadata:
  name: webapp
spec:
  containers:
    - name: webapp-contrainer
      image: kodekloud/event-simulator
      volumeMounts:
        - name: web-storage
          mountPath: /pv/log
  volumes:
    - name: web-storage
      persistentVolumeClaim:
        claimName: my-existing-pvc